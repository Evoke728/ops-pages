<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>受保護的內容</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--va-brand:#6ED0EE;--va-bg:#070707;--va-card:rgba(255,255,255,0.04);--va-border:rgba(255,255,255,0.10);--va-text:#fff;--va-sub:rgba(255,255,255,0.6);--va-danger:#E40014;}
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--va-bg);font-family:'Inter','Noto Sans TC',sans-serif;color:var(--va-text);
background-image:linear-gradient(to right,rgba(128,128,128,0.03) 1px,transparent 1px),linear-gradient(to bottom,rgba(128,128,128,0.03) 1px,transparent 1px);background-size:24px 24px;padding:24px;}
.box{position:relative;width:100%;max-width:380px;text-align:center;}
.box::before{content:'';position:absolute;top:-60%;left:50%;transform:translateX(-50%);width:480px;height:480px;background:radial-gradient(ellipse at center,rgba(110,208,238,0.18) 0%,transparent 70%);pointer-events:none;}
.card{position:relative;background:var(--va-card);border:1px solid var(--va-border);border-radius:24px;padding:40px 32px;box-shadow:0 0 40px 8px rgba(110,208,238,0.08);}
.lock{font-size:34px;margin-bottom:14px;}
h1{font-size:1.25rem;font-weight:700;margin-bottom:8px;}
p.hint{font-size:0.9rem;color:var(--va-sub);margin-bottom:24px;}
input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--va-border);border-radius:9999px;padding:13px 20px;color:#fff;font-size:1rem;text-align:center;letter-spacing:0.3em;outline:none;transition:border-color .15s,box-shadow .15s;}
input:focus{border-color:var(--va-brand);box-shadow:0 0 0 3px rgba(110,208,238,0.15);}
button{width:100%;margin-top:14px;background:var(--va-brand);color:#000;font-weight:700;font-size:0.95rem;padding:13px;border:none;border-radius:9999px;box-shadow:0 0 20px rgba(110,208,238,0.4);cursor:pointer;transition:transform .15s,box-shadow .15s;}
button:hover{transform:scale(1.03);box-shadow:0 0 40px rgba(110,208,238,0.5);}
button:active{transform:scale(0.97);}
.err{color:var(--va-danger);font-size:0.85rem;margin-top:14px;min-height:1.1em;}
</style>
</head>
<body>
<div class="box"><div class="card">
<div class="lock">🔒</div>
<h1>受保護的內容</h1>
<p class="hint">請輸入密碼查看</p>
<form id="f"><input id="pw" type="password" inputmode="numeric" autocomplete="off" placeholder="密碼" autofocus><button type="submit">解鎖</button></form>
<div class="err" id="err"></div>
</div></div>

const b64d=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function decrypt(pw){
  const enc=new TextEncoder();
  const base=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64d(SALT),iterations:ITER,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(IV)},key,b64d(CT));
  return new TextDecoder().decode(pt);
}

  e.preventDefault();
  const err=document.getElementById('err');err.textContent='';
  try{
    const html=await decrypt(document.getElementById('pw').value);
    document.open();document.write(html);document.close();
  }catch(_){err.textContent='密碼錯誤';document.getElementById('pw').value='';}
});
